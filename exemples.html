<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/tokens.css">
    <link rel="stylesheet" href="static/css/base.css">
    <link rel="stylesheet" href="static/css/components.css">
    <link rel="stylesheet" href="static/css/forms.css">
    <link rel="stylesheet" href="static/css/ui.css">
    <link rel="icon" href="static/img/logo-icon.svg">
    <script src="static/js/main.js" type="text/javascript" defer></script>
    <script src="static/js/dark-mode.js" type="text/javascript" defer></script>
    <title>Examples — AiraKit</title>
    
</head>

<body>
    <aira-navbar></aira-navbar>

    <div class="page-hero">
        <p class="section-label">Built with AiraKit</p>
        <h1>Examples</h1>
        <p>Real tools and projects built using AiraKit. Click any card to open the project.</p>
    </div>

    <div class="examples-wrapper">
        <div class="examples-grid" id="examples-grid">

            <!-- Project card -->
            <a class="project-card"
               href="https://adrielfilipetech.github.io/instagram-carousel-splitter/"
               target="_blank"
               rel="noopener noreferrer">
                <div class="project-preview">
                    <div class="project-preview-bar">
                        <span></span><span></span><span></span>
                    </div>
                    <iframe
                        src="https://adrielfilipetech.github.io/instagram-carousel-splitter/"
                        title="Instagram Carousel Splitter preview"
                        loading="lazy"
                        sandbox="allow-scripts allow-same-origin">
                    </iframe>
                </div>
                <div class="project-info">
                    <span class="project-name">Instagram Carousel Splitter</span>
                    <span class="project-desc">Auto split any image into perfectly sized slices for Instagram carousel posts.</span>
                    <div class="project-footer">
                        <span class="project-tag">Tool</span>
                        <span class="project-open">
                            Open
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="7" y1="17" x2="17" y2="7"/>
                                <polyline points="7 7 17 7 17 17"/>
                            </svg>
                        </span>
                    </div>
                </div>
            </a>

            <!-- Add more project cards here following the same structure -->

        </div>
    </div>

    <aira-footer></aira-footer>
</body>
</html>
